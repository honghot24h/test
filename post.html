<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Đang tải nội dung...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS MỚI: Đưa quảng cáo ra toàn màn hình, đè lên tất cả */
        .ads-overlay-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 99999; /* Luôn nằm trên cùng */
            display: none; /* Hiện bằng JS */
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .ads-content-fixed {
            position: relative;
            max-width: 90%;
            text-align: center;
        }
        .ads-content-fixed img {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            border: 2px solid #fff;
        }
        .close-ads-fixed {
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="shopee-ads-overlay" class="ads-overlay-fixed" onclick="handleTrapClick()">
        <div class="ads-content-fixed">
            <div class="close-ads-fixed">X Đóng quảng cáo</div>
            <img src="images/shopee-ads.webp" alt="Quảng cáo Shopee">
        </div>
    </div>

    <header>
        <div class="container">
            <div class="logo"><a href="index.html">HÓNG HỚT <span>ĐƯỜNG PHỐ</span></a></div>
            <nav>
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="#">Video Hót</a></li>
                    <li>
                        <a href="https://www.facebook.com/profile.php?id=61578446126343" target="_blank" style="color: #1877F2; font-weight: bold;">
                            <i class="fab fa-facebook"></i> FANPAGE
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container main-layout">
        <section class="content">
            <div class="post-body">
                <div class="post-header">
                    <div class="meta" style="color: #666; margin-bottom: 10px;">Tin tức • Xinh Gái Tinh Quái</div>
                    <h1 id="main-title">Đang tải tiêu đề...</h1>
                </div>

                <div class="video-wrapper" style="position: relative;">
                    <video id="main-video" controls autoplay muted>
                        <source src="" type="video/mp4">
                        Trình duyệt không hỗ trợ.
                    </video>
                </div>

                <div class="post-text" id="post-content-text" style="margin-top: 20px;">
                    Nội dung bài viết đang được tải...
                </div>

                <img id="main-img" src="" class="detail-img" alt="Ảnh chi tiết">

                <p class="author-sign">Biên tập: <strong>Xinh Gái Tinh Quái</strong></p>
            </div>
        </section>

        <aside class="sidebar">
            <div class="widget">
                <h3 class="widget-title">Quảng Cáo</h3>
                <div style="background: #e9e9e9; height: 300px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
                    Liên hệ đặt quảng cáo
                </div>
            </div>
        </aside>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Xinh Gái Tinh Quái - <strong>.</strong></p>
        </div>
    </footer>

    <a href="https://www.facebook.com/profile.php?id=61578446126343i" class="fb-chat-button" target="_blank">
        <i class="fab fa-facebook-messenger"></i> Nhắn tin
    </a>

    <script>

            "1": { title: "‼️Giải cứu thành công bé trai 10 tuổi mắc kẹt giữa hai bức tường", video: "videos/video1.mp4", img: "images/thump1.jpg", content: "Sáng nay tại khu vực trung tâm đã xảy ra một sự việc thu hút hàng trăm người hiếu kỳ..." },
            "2": { title: "ĐÊM QUA TẠI TRUNG KÍNH - CẦU GIẤY ‼️", video: "videos/video2.mp4", img: "images/thumb2.jpg", content: "Dù nằm sâu trong hẻm nhưng quán lúc nào cũng tấp nập khách ra vào..." },
            "3": { title: "Thanh Hoá: Bjen c,ăng tai mỏ đá 🔪🔪🔨🔨🩸🥶", video: "videos/video3.mp4", img: "images/thumb3.jpg", content: "Bjen c,ăng tai mỏ đá 🔪🔪🔨🔨🩸🥶" },
            "4": { title: "Đường Nguyễn Hữu Thọ, đoạn gần cầu Kênh Tẻ (hướng từ Quận 7 sang Quận 4) xảy ra sự cố giữa xe chở rác và một tấm thép lớn. Tài xế xe rác không qua khỏi", video: "videos/video4.mp4", img: "images/thumb4.jpg", content: "" },
            "5": { title: "Quá may mắn cho chị gái và xe Cont, chỉ 1 chút nữa thôi thì.", video: "videos/video5.mp4", img: "images/thumb5.jpg", content: "Chỉ với một điệu nhảy đơn giản kết hợp nền nhạc bắt tai, trend này đã thu hút hàng triệu lượt xem..." },
            "6": { title: "‼️ Xe tải lùi ko có lơ đã vô tình cướ** đi 1 m:ạng sống", video: "videos/video6.mp4", img: "images/thumb6.jpg", content: "Phía sau những nụ cười, những video triệu view hào nhoáng là cả một quá trình làm việc đầy áp lực..." },
            "7": { title: "THUỶ NGUYÊN ngay lúc này!", video: "videos/video7.mp4", img: "images/thumb7.jpg", content: "THUỶ NGUYÊN ngay lúc này!" },
            "8": { title: "Mấy thanh niên choảng nhau tại quán nhậu, 01 thanh niên đi cấp cứu.", video: "videos/video8.mp4", img: "images/thumb8.jpg", content: "Mấy thanh niên choảng nhau tại quán nhậu, 01 thanh niên đi cấp cứu. này..." },
            "9": { title: "Choáng ngợp trước dàn siêu xe diễu hành cuối tuần", video: "videos/video9.mp4", img: "images/thumb9.jpg", content: "Cuối tuần qua, người dân đã được dịp mãn nhãn với màn tụ họp của hàng loạt siêu xe..." },
            "10": { title: "Điểm lại 5 sự kiện chấn động cộng đồng mạng tuần qua", video: "videos/video10.mp4", img: "images/thumb10.jpg", content: "Một tuần trôi qua với quá nhiều tin tức nóng hổi. Xem ngay video tổng hợp nhanh..." }
        };

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            // HIỆN QUẢNG CÁO NGAY LẬP TỨC KHI VỪA VÀO TRANG
            document.getElementById('shopee-ads-overlay').style.display = 'flex';

            if (id && dataPosts[id]) {
                const post = dataPosts[id];
                document.getElementById('page-title').innerText = post.title;
                document.getElementById('main-title').innerText = post.title;
                document.getElementById('post-content-text').innerText = post.content;
                document.getElementById('main-video').src = post.video;
                document.getElementById('main-img').src = post.img;
            } else {
                document.getElementById('main-title').innerText = "Bài viết không tồn tại!";
                document.getElementById('post-content-text').innerText = "Vui lòng quay lại trang chủ.";
                document.getElementById('main-video').style.display = 'none';
                document.getElementById('main-img').style.display = 'none';
            }
        };

        function handleTrapClick() {
            window.open("https://s.shopee.vn/7fVPcJNUjm", "_blank");
            document.getElementById('shopee-ads-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
